<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motorlu Taşıt Takip Sistemi </title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="form-wrapper">
        <div class="banner">
          <h1>OMÜ</h1>
          <p>Motorlu Taşıt Takip Sistemi</p>
        </div>
        <div class="green-bg">
          <button type="button">Giriş</button>
        </div>
        <form class="signup-form" id="loginForm">
          <h1>Yönetici Girişi</h1>
          
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Yönetici id" id="adminId" />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Şifre" id="password" />
          </div>
          <button type="button" id="loginButton">Giriş</button>
        </form>
      </div>
    </div>
    
    <script type="text/javascript" src="/eel.js"></script>
    <script src="script.js"></script>
  </body>
</html>
