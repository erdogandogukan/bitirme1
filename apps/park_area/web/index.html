<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Alanı Takip</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="text/javascript" src="/eel.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <span>Park Alanı Takip</span>
    </nav>
    <div class="error-box hidden" id="errorBox">
      <p id="errorMessage">Hata mesajı burada görünecek.</p>
    </div>
    <div class="container">
      <!-- Kontrol Paneli -->
      <div class="control-panel">
        <!-- Video Kaynağı -->
        <div class="panel">
          <h3 class="panel-title">Video Kaynağı</h3>
          <div class="input-group">
            <div>
              <input
                type="radio"
                id="cameraSource"
                name="source"
                value="camera"
                checked
              />
              <label for="cameraSource">Kamera</label>
            </div>
            <select id="cameraSelect" class="form-control">
              <option value="">Kamera seçiniz</option>
            </select>
          </div>
          <div class="input-group">
            <div>
              <input
                type="radio"
                id="videoSource"
                name="source"
                value="video"
              />
              <label for="videoSource">Video Dosyası</label>
            </div>
            <div class="d-flex align-center">
              <input
                type="text"
                id="videoPath"
                class="form-control full-width"
                readonly
              />
              <button id="selectVideoBtn" class="btn">Video Seç</button>
            </div>
          </div>
          <div class="input-group">
            <div>
              <input type="radio" id="ipSource" name="source" value="ip" />
              <label for="ipSource">IP Kamera</label>
            </div>
            <input
              type="text"
              id="ipUrl"
              class="form-control"
              placeholder="rtsp://<IP>:554/stream"
              disabled
            />
          </div>
        </div>
        <div class="panel">
          <h3 class="panel-title">Koordinat Dosyası</h3>
          <div class="d-flex align-center">
            <input
              type="text"
              id="coordinatePath"
              class="form-control full-width"
              readonly
            />
            <div class="d-flex align-center">
              <input
                type="file"
                id="coordinateFile"
                accept=".json"
                style="display: none"
              />
              <button>Dosya Seç</button>
            </div>
          </div>
        </div>
        <div class="action-buttons">
          <button id="startBtn" class="full-width">Başlat</button>
          <button id="stopBtn" class="full-width danger hidden">Durdur</button>
        </div>
      </div>

      <div class="content-wrapper">
        <div class="tab-section">
          <div class="tabs">
            <button class="tab-btn active" data-tab="main">Takip Ekranı</button>
            <button class="tab-btn" data-tab="selector">
              Koordinat Ayarları
            </button>
          </div>
          <div class="tab-content hidden" id="selectorTab">
            <div class="panel">
              <h3 class="panel-title">Koordinat Dosyası Oluştur</h3>
              <div class="input-group d-flex align-center justify-between">
                <label for="fileNaming">Dosya Adı:</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    id="fileNaming"
                    class="form-control full-width"
                  />
                </div>
              </div>
              <div class="input-group">
                <div class="file-select d-flex align-center justify-between">
                  <label>Konum:</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      id="folderPath"
                      class="form-control full-width"
                    />
                    <button id="selectFolder" class="btn">Konum Seç</button>
                  </div>
                </div>
              </div>
              <button id="createCoordinateFile" class="full-width">
                Dosya Oluştur
              </button>
            </div>
            <div class="panel">
              <h3 class="panel-title">Koordinat Seçici</h3>
              <div class="input-group">
                <div class="file-select d-flex align-center justify-between">
                  <label>Koordinat Dosyası:</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      id="selectorCoordinateAddress"
                      class="form-control full-width"
                      readonly
                    />
                    <label class="d-flex align-center">
                      <input
                        type="file"
                        id="selectorCoordinateFile"
                        accept=".json"
                        style="display: none"
                      />
                      <button>Dosya Seç</button>
                    </label>
                  </div>
                </div>
              </div>
              <div class="input-group d-flex align-center justify-between">
                <label>Alan Adı:</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    id="selectorAreaName"
                    class="form-control full-width"
                    placeholder="örneğin A"
                  />
                </div>
              </div>
              <div class="input-group d-flex align-center justify-between">
                <label>Hücre Adı:</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    id="selectorCellName"
                    class="form-control full-width"
                    placeholder="örneğin 1"
                  />
                </div>
              </div>
              <button id="selectorStartBtn" class="full-width">
                Seçime Başla
              </button>
            </div>
          </div>
        </div>
        <div class="content-area">
          <div class="video-feed">
            <img id="videoFeed" src="" alt="Video görüntüsü" />
          </div>
          <div class="status-panel">
            <h3>Park Alanı Durumu</h3>
            <input
              type="text"
              id="stateName"
              class="form-control"
              placeholder="Durum Başlığı"
            />
            <div class="overlay-container">
              <img
                id="statusImage"
                src=""
                alt="Statik Durum Görseli"
                style="width: 100%; height: auto; margin: 10px 0"
              />
            </div>
            <div id="parkingStatus" class="status-display"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
